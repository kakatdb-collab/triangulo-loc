    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://triangulofotoclub.com.br" />

    <!-- Google Fonts loaded optimally (non-blocking) -->

    <!-- SEO & AI Search Engine Optimization -->
    <title>Triângulo Estúdio • Estúdio de Locação em São Paulo Centro</title>
    <meta name="description" content="Triângulo Estúdio é o melhor estúdio de locação barato no centro de São Paulo (SP). Espaço completo para fotografia, videoclipes e ensaios, próximo ao metrô com ciclorama e iluminação inclusa." />
    <meta name="keywords" content="estudio de locacao, estudio de locação, estudio barato, estudio centro de sao paulo, estudio de fotos sp, estudio proximo ao metro, estudio centro sp, triangulo estudio, estudio fotográfico são paulo" />
    <meta name="author" content="Triângulo Estúdio" />
    <meta name="robots" content="index, follow" />
    
    <!-- OpenGraph (Social Media & AI preview card optimization) -->
    <meta property="og:title" content="Triângulo Estúdio • Estúdio de Locação no Centro de SP" />
    <meta property="og:description" content="Alugue o estúdio de fotos e vídeos mais barato e completo no centro de São Paulo, a poucos minutos do metrô. Fundo infinito, camarim e iluminação profissional." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Triângulo Estúdio" />

      "@context": "https://schema.org",

      "url": "https://triangulofotoclub.com.br",

        "@type": "PostalAddress",
